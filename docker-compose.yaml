networks:
  gitea-net:
    name: gitea-net
    driver: bridge

volumes:
  gitea-db-data:
    name: gitea-db-data
  pgadmin-data:
    name: pgadmin-data
  gitea-data:
    name: gitea-data
  gitea-runner-data:
    name: gitea-runner-data
  drone-data:
    name: drone-data

services:
  # Reverse proxy for Drone CI, Gitea, pgAdmin
  nginx:
    container_name: nginx
    image: docker.io/nginx:1.31
    networks:
      gitea-net:
        aliases:
          - gitea.local
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/certs:/etc/nginx/certs:ro

  gitea-db:
    container_name: gitea-postgres
    image: docker.io/postgres:17
    restart: always
    shm_size: 512mb # sync with shared_buffers in performance-tweaks.conf
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - gitea-net
    volumes:
      - gitea-db-data:/var/lib/postgresql/data
      - ./src/postgres/init-scripts/:/docker-entrypoint-initdb.d:ro

  gitea:
    container_name: gitea
    image: docker.gitea.com/gitea:1.26.4
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
      - GITEA__server__PROTOCOL=http
      - GITEA__server__DOMAIN=gitea.local
      - GITEA__server__SSH_DOMAIN=gitea.local
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__ROOT_URL=https://gitea.local
      - GITEA__server__ENABLE_REVERSE_PROXY=true
      - GITEA__i18n__LANGS=en-US
      - GITEA__i18n__NAMES=English
      - GITEA__security__SECRET_KEY=${GITEA__security__SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA__security__INTERNAL_TOKEN}
      - GITEA__webhook__ALLOWED_HOST_LIST=external,loopback,private
      - GITEA__actions__DEFAULT_ACTIONS_URL=github
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    ports:
      - "2222:22"
    networks:
      - gitea-net

  gitea-runner:
    image: gitea/act_runner:0
    container_name: gitea-runner
    restart: always
    volumes:
      - gitea-runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src/certs/rootCA.pem:/etc/ssl/certs/ca-certificates.crt:ro
      - ./src/gitea-runner/config.yaml:/config.yaml:ro
    environment:
      - GITEA_INSTANCE_INSECURE=true
      - GITEA_INSTANCE_URL=https://gitea.local
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=local-gitea-runner
      - GITEA_RUNNER_EXTRA_ARGS=--insecure
      - CONFIG_FILE=/config.yaml
    networks:
      - gitea-net

