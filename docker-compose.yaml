networks:
  proxy-net:
    name: proxy-net
    driver: bridge
  ci-net:
    name: ci-net
    driver: bridge
  gitea-db-net:
    name: gitea-db-net
    internal: true
  drone-db-net:
    name: drone-db-net
    internal: true
  pgadmin-db-net:
    name: pgadmin-db-net
    internal: true

volumes:
  gitea-db-data:
    name: gitea-db-data
  pgadmin-data:
    name: pgadmin-data
  gitea-data:
    name: gitea-data
  gitea-runner-data:
    name: gitea-runner-data
  drone-data:
    name: drone-data

services:
  # Reverse proxy for Drone CI, Gitea, pgAdmin
  nginx:
    container_name: nginx
    image: nginx:alpine
    networks:
      proxy-net:
        aliases:
          - gitea.local
          - drone-server.local
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/certs:/etc/nginx/certs:ro
    depends_on:
      - gitea
      - pgadmin
      - drone-server
      - drone-runner

  gitea-db:
    container_name: gitea-postgres
    image: docker.io/postgres:17-alpine
    restart: always
    shm_size: 512mb # sync with shared_buffers in performance-tweaks.conf
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - gitea-db-net
      - drone-db-net
      - pgadmin-db-net
    volumes:
      - gitea-db-data:/var/lib/postgresql/data
      - ./src/postgres/init-scripts/:/docker-entrypoint-initdb.d:ro

  gitea:
    container_name: gitea
    image: docker.gitea.com/gitea:1.26.4
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__DEFAULT__APP_NAME=Pandora Gitea
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
      - GITEA__server__PROTOCOL=http
      - GITEA__server__DOMAIN=gitea.local
      - GITEA__server__SSH_DOMAIN=gitea.local
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__ROOT_URL=https://gitea.local
      - GITEA__server__ENABLE_REVERSE_PROXY=true
      - GITEA__i18n__LANGS=en-US
      - GITEA__i18n__NAMES=English
      - GITEA__security__SECRET_KEY=${GITEA__security__SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA__security__INTERNAL_TOKEN}
      - GITEA__webhook__ALLOWED_HOST_LIST=external,loopback,private
      - GITEA__actions__ENABLED=true
      - GITEA__actions__DEFAULT_ACTIONS_URL=github
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    ports:
      - "2222:22"
    networks:
      proxy-net: {}
      gitea-db-net: {}
      ci-net:
        aliases:
          - gitea
    depends_on:
      - gitea-db

  gitea-runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitea-runner-data:/data
      - ./src/certs/rootCA.pem:/etc/ssl/certs.pem:ro
      - ./src/gitea-runner/config.yaml:/config.yaml:ro
    environment:
      - GITEA_INSTANCE_INSECURE=true
      - GITEA_INSTANCE_URL=https://gitea.local
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=local-gitea-runner
      - GITEA_RUNNER_EXTRA_ARGS=--insecure
      - CONFIG_FILE=/config.yaml
    networks:
      - ci-net
      - proxy-net
    depends_on:
      - gitea

  drone-server:
    image: drone/drone:2
    container_name: drone-server
    volumes:
      - drone-data:/data
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    environment:
      # Интеграция с Gitea (данные из OAuth-приложения в Gitea)
      - DRONE_GITEA_CLIENT_ID=${DRONE_GITEA_CLIENT_ID}
      - DRONE_GITEA_CLIENT_SECRET=${DRONE_GITEA_CLIENT_SECRET}
      - DRONE_GITEA_SERVER=https://gitea.local

      # Внешний адрес Drone (обязательно HTTPS, так как Nginx принимает HTTPS)
      - DRONE_SERVER_HOST=drone-server.local
      - DRONE_SERVER_PROTO=https

      # Секретный ключ для связи Drone Server <-> Drone Runner (сгенерируйте случайную строку)
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}

      # Разрешить Drone использовать авторизацию Gitea для git clone
      - DRONE_GIT_ALWAYS_AUTH=false

      - DRONE_DATABASE_DRIVER=postgres
      - DRONE_DATABASE_DATASOURCE=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@gitea-db:5432/drone?sslmode=disable
    networks:
      - proxy-net
      - drone-db-net
    restart: always

  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    environment:
      - DRONE_RPC_HOST=drone-server.local
      - DRONE_RPC_PROTO=https
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_RUNNER_NAME=local-docker-runner
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_SKIP_VERIFY=true
      - DRONE_RUNNER_NETWORKS=ci-net
    networks:
      - ci-net
      - proxy-net
    depends_on:
      - drone-server

  pgadmin:
    image: docker.io/dpage/pgadmin4:9.16
    container_name: pgadmin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: "False"
      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    depends_on:
      - gitea-db
    networks:
      - proxy-net
      - pgadmin-db-net
