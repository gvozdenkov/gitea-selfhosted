services:
  gitea-db:
    container_name: gitea-postgres
    image: docker.io/postgres:17-alpine
    restart: always
    shm_size: 512mb # sync with shared_buffers in performance-tweaks.conf
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gitea-network
    volumes:
      - gitea-db-data:/var/lib/postgresql/data
      - ./src/postgres/init-scripts/:/docker-entrypoint-initdb.d:ro

  pgadmin:
    image: docker.io/dpage/pgadmin4:9.16
    container_name: pgadmin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret
      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: "False"
      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:80/misc/ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      gitea-db:
        condition: service_healthy
    networks:
      - gitea-network

  gitea:
    container_name: gitea
    image: docker.gitea.com/gitea:1.26.4
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
      - GITEA__server__ROOT_URL=https://gitea.local
      - GITEA__server__DOMAIN=gitea.local
      - GITEA__server__SSH_DOMAIN=gitea.local
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__DISABLE_HTTP_GIT=false
      - GITEA__i18n__LANGS=en-US
      - GITEA__i18n__NAMES=English
      - GITEA__security__SECRET_KEY=${GITEA__security__SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA__security__INTERNAL_TOKEN}
      - GITEA__webhook__ALLOWED_HOST_LIST=external,loopback,private
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "2222:22"
    networks:
      - gitea-network
    depends_on:
      gitea-db:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:alpine
    networks:
      gitea-network:
        # TODO: read more about aliases
        aliases:
          - gitea.local
          - drone-server.local
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/certs:/etc/nginx/certs:ro
    depends_on:
      gitea:
        condition: service_healthy
      pgadmin:
        condition: service_started
      drone-server:
        condition: service_started
      drone-runner:
        condition: service_started

  drone-server:
    image: drone/drone:2
    container_name: drone-server
    volumes:
      - drone-data:/data
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    environment:
      # Интеграция с Gitea (данные из OAuth-приложения в Gitea)
      - DRONE_GITEA_CLIENT_ID=${DRONE_GITEA_CLIENT_ID}
      - DRONE_GITEA_CLIENT_SECRET=${DRONE_GITEA_CLIENT_SECRET}
      - DRONE_GITEA_SERVER=https://gitea.local

      # Внешний адрес Drone (обязательно HTTPS, так как Nginx принимает HTTPS)
      - DRONE_SERVER_HOST=drone-server.local
      - DRONE_SERVER_PROTO=https

      # Секретный ключ для связи Drone Server <-> Drone Runner (сгенерируйте случайную строку)
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}

      # Разрешить Drone использовать авторизацию Gitea для git clone
      - DRONE_GIT_ALWAYS_AUTH=false

      - DRONE_DATABASE_DRIVER=postgres
      - DRONE_DATABASE_DATASOURCE=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@gitea-db:5432/drone?sslmode=disable
    networks:
      - gitea-network
    restart: always

  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    environment:
      - DRONE_RPC_HOST=drone-server
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_RUNNER_NAME=local-docker-runner
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_SKIP_VERIFY=true
      # Create job containers inside docker network, but require custom clone step
      - DRONE_RUNNER_NETWORKS=gitea-network
    networks:
      - gitea-network
    depends_on:
      - drone-server

networks:
  gitea-network:
    name: gitea-network
    external: false
    driver: bridge

volumes:
  gitea-db-data:
    # TODO: more details about volume types pros/cons
    name: gitea-db-data
  pgadmin-data:
    name: pgadmin-data
  gitea-data:
    name: gitea-data
  drone-data:
    name: drone-data
