events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Отключаем ограничение на размер загружаемых файлов (важно для больших git push)
    client_max_body_size 0;

    # Редирект с HTTP на HTTPS
    server {
        listen 80;
        server_name gitea.local pgadmin.local;
        return 301 https://$host$request_uri;
    }

    # Основной сервер HTTPS
    server {
        listen 443 ssl;
        server_name gitea.local;

        # Пути к сертификатам внутри контейнера Nginx
        ssl_certificate     /etc/nginx/certs/gitea.local.crt;
        ssl_certificate_key /etc/nginx/certs/gitea.local.key;

        # Рекомендуемые настройки безопасности SSL
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            # Проксирование на контейнер Gitea по внутреннему порту 3000
            proxy_pass http://gitea:3000;

            # Передача оригинальных заголовков (необходимо для правильной работы Gitea)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Настройки для поддержки WebSockets (нужно для некоторых функций Gitea)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 443 ssl;
        server_name pgadmin.local;

        location / {
            # Проксирование на контейнер pgadmin по внутреннему порту 80
            proxy_pass http://pgadmin:80;

            # Стандартные заголовки проксирования
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Критический заголовок для корректной маршрутизации статики внутри pgAdmin
            proxy_set_header X-Script-Name "";
        }

    }

}
