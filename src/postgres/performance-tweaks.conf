# Memory Settings
shared_buffers = 512MB                  # 25% of total RAM
work_mem = 16MB                       # Cache for complex sorting/joins per query
maintenance_work_mem = 128MB          # Speed up index creation and vacuums
effective_cache_size = 1GB            # ~75% of RAM (heuristic for OS page cache)

# Planner Cost Constants (Crucial for Docker/SSD)
# Lowers costs assuming your Docker volume is backed by an SSD
random_page_cost = 1.1                # Default is 4.0 (for HDDs). Lowering forces index usage.
effective_io_concurrency = 200        # Allows OS to pre-fetch requests on SSDs

# Connection Settings
max_connections = 60                  # Gitea uses internal connection pooling; small teams rarely need >50.

# Write-Ahead Log (WAL) & Disk Syncing
wal_buffers = 16MB                    # Auto-tuned generally, explicitly set for stability
checkpoint_completion_target = 0.9    # Spread checkpoints out over 90% of the duration
checkpoint_timeout = 15min            # Reduces disk write spikes for small, steady traffic
min_wal_size = 1GB                    # Prevents aggressive WAL recycling
max_wal_size = 4GB                    # Max allowed peak WAL size before forced checkpoints

# Background Writer
bgwriter_delay = 20ms                 # Round-trip timing for background flushes
bgwriter_lru_maxpages = 100           # Maximizes buffer clearing to background tasks

# Autovacuum Settings (Keeps Gitea's active tables lean)
autovacuum_max_workers = 3            # Default works well for low CPU setups
autovacuum_vacuum_scale_factor = 0.1   # Vacuum table when 10% of rows change
autovacuum_analyze_scale_factor = 0.05 # Re-analyze table when 5% of rows change

# gitea specific
password_encryption = scram-sha-256